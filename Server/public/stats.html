<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liftoff Competition · Stats</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d0d0f;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      background: #111318;
      border-bottom: 2px solid #f97316;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header h1 { font-size: 1.4rem; color: #f97316; letter-spacing: 0.05em; }
    header a {
      margin-left: auto;
      color: #888;
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 0.2s;
    }
    header a:hover { color: #f97316; }

    main { max-width: 1200px; margin: 0 auto; padding: 2rem 1rem; display: grid; gap: 2rem; }

    /* Overview cards */
    .overview-bar {
      display: flex;
      gap: 1rem;
    }
    .overview-card {
      flex: 1;
      background: #111318;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .overview-card .label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #555;
    }
    .overview-card .value {
      font-size: 2rem;
      font-weight: 700;
      color: #f97316;
      font-variant-numeric: tabular-nums;
    }

    /* Filters */
    .filters {
      background: #111318;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 1.25rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: flex-end;
    }
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      min-width: 160px;
    }
    .filter-group.wide { flex: 1; min-width: 200px; }
    .filter-group label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #666;
    }
    .filter-group select,
    .filter-group input {
      background: #0d0d0f;
      border: 1px solid #333;
      border-radius: 4px;
      color: #e0e0e0;
      padding: 0.5rem 0.6rem;
      font-size: 0.85rem;
      font-family: inherit;
    }
    .filter-group select:focus,
    .filter-group input:focus {
      outline: none;
      border-color: #f97316;
    }
    .filter-actions {
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
    }
    .btn {
      padding: 0.5rem 1.2rem;
      border: none;
      border-radius: 4px;
      font-size: 0.85rem;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }
    .btn-primary {
      background: #f97316;
      color: #fff;
    }
    .btn-primary:hover { background: #ea580c; }
    .btn-secondary {
      background: #222;
      color: #aaa;
    }
    .btn-secondary:hover { background: #333; }

    /* Results section */
    section {
      background: #111318;
      border: 1px solid #222;
      border-radius: 8px;
      overflow: hidden;
    }
    .section-header {
      padding: 0.75rem 1.25rem;
      background: #16181f;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #f97316;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .result-count { color: #666; font-size: 0.8rem; text-transform: none; letter-spacing: normal; }

    table { width: 100%; border-collapse: collapse; }
    th {
      padding: 0.6rem 1rem;
      text-align: left;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #666;
      border-bottom: 1px solid #1e1e24;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    th:hover { color: #f97316; }
    th .sort-arrow { font-size: 0.65rem; margin-left: 0.3rem; }
    td {
      padding: 0.65rem 1rem;
      font-size: 0.9rem;
      border-bottom: 1px solid #18181e;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #16181f; }

    .lap-time { font-variant-numeric: tabular-nums; font-weight: 600; color: #f0f0f0; }
    .best-time { color: #a855f7; }
    .pilot-name { font-weight: 500; }
    .env-badge {
      display: inline-block;
      background: #1a1a2e;
      color: #818cf8;
      padding: 0.15rem 0.5rem;
      border-radius: 3px;
      font-size: 0.78rem;
    }
    .track-name { color: #94a3b8; }
    .date-cell { color: #666; font-size: 0.82rem; white-space: nowrap; }

    .empty { padding: 2rem; text-align: center; color: #444; font-size: 0.9rem; }

    /* Pagination */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem;
      border-top: 1px solid #1e1e24;
    }
    .pagination button {
      background: #1a1a2e;
      border: 1px solid #333;
      color: #e0e0e0;
      padding: 0.4rem 0.9rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.82rem;
      font-family: inherit;
      transition: background 0.2s;
    }
    .pagination button:hover:not(:disabled) { background: #f97316; border-color: #f97316; }
    .pagination button:disabled { opacity: 0.3; cursor: default; }
    .pagination .page-info { color: #666; font-size: 0.82rem; }

    /* Leaderboard tab */
    .tabs {
      display: flex;
      gap: 0;
      background: #16181f;
      border-bottom: 1px solid #222;
    }
    .tab {
      padding: 0.65rem 1.5rem;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #666;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
      font-family: inherit;
    }
    .tab:hover { color: #aaa; }
    .tab.active { color: #f97316; border-bottom-color: #f97316; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    @media (max-width: 700px) {
      .overview-bar { flex-direction: column; }
      .filters { flex-direction: column; }
      .filter-group { min-width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <h1>⚡ Liftoff Stats</h1>
  <a href="/">← Back to Live</a>
  <a href="/about.html" style="margin-left:auto;color:#888;text-decoration:none;font-size:0.85rem;transition:color 0.2s;" onmouseover="this.style.color='#f97316'" onmouseout="this.style.color='#888'">About</a>
</header>

<main>
  <!-- Overview stats -->
  <div class="overview-bar">
    <div class="overview-card">
      <div class="label">Total Laps</div>
      <div class="value" id="stat-laps">—</div>
    </div>
    <div class="overview-card">
      <div class="label">Total Pilots</div>
      <div class="value" id="stat-pilots">—</div>
    </div>
    <div class="overview-card">
      <div class="label">Total Races</div>
      <div class="value" id="stat-races">—</div>
    </div>
  </div>

  <!-- Tabs -->
  <section>
    <div class="tabs">
      <button class="tab active" data-tab="browser">Lap Browser</button>
      <button class="tab" data-tab="leaderboard">Leaderboard</button>
    </div>

    <!-- Lap Browser Tab -->
    <div class="tab-content active" id="tab-browser">
      <div class="filters">
        <div class="filter-group">
          <label>Environment</label>
          <select id="filter-env">
            <option value="">All environments</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Track</label>
          <select id="filter-track">
            <option value="">All tracks</option>
          </select>
        </div>
        <div class="filter-group wide">
          <label>Pilot</label>
          <input type="text" id="filter-pilot" placeholder="Search pilot name…">
        </div>
        <div class="filter-group">
          <label>From</label>
          <input type="date" id="filter-from">
        </div>
        <div class="filter-group">
          <label>To</label>
          <input type="date" id="filter-to">
        </div>
        <div class="filter-actions">
          <button class="btn btn-primary" id="btn-search">Search</button>
          <button class="btn btn-secondary" id="btn-clear">Clear</button>
        </div>
      </div>

      <div class="section-header">
        <span>Results</span>
        <span class="result-count" id="result-count"></span>
      </div>

      <table>
        <thead>
          <tr>
            <th>Pilot</th>
            <th>Lap #</th>
            <th>Lap Time</th>
            <th>Environment</th>
            <th>Track</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="browser-body">
          <tr><td colspan="6" class="empty">Use the filters above to search laps.</td></tr>
        </tbody>
      </table>

      <div class="pagination" id="pagination">
        <button id="page-first" disabled>« First</button>
        <button id="page-prev" disabled>‹ Prev</button>
        <span class="page-info" id="page-info"></span>
        <button id="page-next" disabled>Next ›</button>
        <button id="page-last" disabled>Last »</button>
      </div>
    </div>

    <!-- Leaderboard Tab -->
    <div class="tab-content" id="tab-leaderboard">
      <div class="filters" style="border-radius: 0; border: none; border-bottom: 1px solid #222;">
        <div class="filter-group">
          <label>Environment</label>
          <select id="lb-env">
            <option value="">All environments</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Track</label>
          <select id="lb-track">
            <option value="">All tracks</option>
          </select>
        </div>
        <div class="filter-actions">
          <button class="btn btn-primary" id="btn-lb-search">Show</button>
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Pilot</th>
            <th>Best Lap</th>
            <th>Total Laps</th>
          </tr>
        </thead>
        <tbody id="lb-body">
          <tr><td colspan="4" class="empty">Select filters and click Show.</td></tr>
        </tbody>
      </table>
    </div>
  </section>
</main>

<script src="/js/shared.js"></script>
<script src="/js/stats.js"></script>
</body>
</html>
